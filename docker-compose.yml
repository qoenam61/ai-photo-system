name: photo

networks:
  default:
  trading_net:
    external: true

services:
  classify-service:
    container_name: photo-classify
    build:
      context: .
      dockerfile: Dockerfile.classify
    restart: unless-stopped
    networks:
      - default
      - trading_net
    ports:
      # iPhone 단축어 LAN 접근용 (가정 Wi-Fi 한정).
      # 사용자 명시 2026-05-05.
      - "8765:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /Volumes/Immich-Storage:/storage:ro
      - ./scripts/_inventory:/app/scripts/_inventory:ro
    environment:
      OLLAMA_URL: http://host.docker.internal:11434/api/generate
      OLLAMA_MODEL: qwen2.5vl:7b-q4_K_M
      GROQ_API_KEY: ${GROQ_API_KEY}
      VISION_MODEL_CHAIN: ${VISION_MODEL_CHAIN:-groq,qwen}
      GROQ_VISION_MODEL: ${GROQ_VISION_MODEL:-meta-llama/llama-4-scout-17b-16e-instruct}
      PHOTO_DB_DSN: host=trading_postgres port=5432 dbname=trading_db user=trading_user password=RyIokQY7bV3y7SEsyFLu2Oa6
      IMMICH_DB_DSN: host=immich-postgres port=5432 dbname=immich user=postgres password=${IMMICH_DB_PASSWORD:-immich_pg_2026}
      IMMICH_API_URL: http://immich-server:2283
      IMMICH_API_KEY: ${IMMICH_API_KEY}
      STORAGE_PREFIX: /storage
      STORAGE_PREFIX_FROM: /Volumes/Immich-Storage
      TZ: Asia/Seoul
    deploy:
      resources:
        limits:
          memory: 2G

  immich-https:
    container_name: immich-https
    image: caddy:2-alpine
    restart: unless-stopped
    networks:
      - default
      - trading_net
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
    depends_on:
      - immich-server

  immich-server:
    container_name: immich-server
    image: ghcr.io/immich-app/immich-server:release
    restart: unless-stopped
    ports:
      - "2283:2283"
    networks:
      - default
      - trading_net
    volumes:
      - /Volumes/Immich-Storage/immich-uploads:/usr/src/app/upload
      - /Volumes/Immich-Storage/immich-media:/mnt/external:ro
      - /etc/localtime:/etc/localtime:ro
    environment:
      DB_HOSTNAME: immich-postgres
      DB_USERNAME: postgres
      DB_PASSWORD: ${IMMICH_DB_PASSWORD:-immich_pg_2026}
      DB_DATABASE_NAME: immich
      REDIS_HOSTNAME: immich-redis
      UPLOAD_LOCATION: /usr/src/app/upload
      TZ: Asia/Seoul
    depends_on:
      - immich-postgres
      - immich-redis
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:2283/api/server/ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  immich-machine-learning:
    container_name: immich-ml
    image: ghcr.io/immich-app/immich-machine-learning:release
    restart: unless-stopped
    volumes:
      - immich-ml-cache:/cache
    environment:
      TZ: Asia/Seoul

  immich-redis:
    container_name: immich-redis
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s

  immich-postgres:
    container_name: immich-postgres
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${IMMICH_DB_PASSWORD:-immich_pg_2026}
      POSTGRES_USER: postgres
      POSTGRES_DB: immich
      POSTGRES_INITDB_ARGS: '--data-checksums'
    volumes:
      - immich-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s

volumes:
  immich-ml-cache:
  immich-pgdata:
  caddy-data:
